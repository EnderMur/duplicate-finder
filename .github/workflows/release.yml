name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: duplicate_finder
            asset_name: duplicate_finder-linux-amd64
          - os: windows-latest
            artifact_name: duplicate_finder.exe
            asset_name: duplicate_finder-windows-amd64.exe
          - os: macos-latest
            artifact_name: duplicate_finder
            asset_name: duplicate_finder-macos-amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Release
      run: cargo build --release

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: target/release/${{ matrix.artifact_name }}
        name: Duplicate Finder ${{ github.ref_name }}
        generate_release_notes: true
