name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: duplicate_finder
            asset_name: duplicate_finder-linux-amd64
          - os: windows-latest
            artifact_name: duplicate_finder.exe
            asset_name: duplicate_finder-windows-amd64.exe
          - os: macos-latest
            artifact_name: duplicate_finder
            asset_name: duplicate_finder-macos-amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Release
      run: cargo build --release

    - name: Stage release asset
      shell: bash
      run: |
        mkdir -p dist
        cp "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

    - name: Upload build artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}
        if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        path: release-assets
        merge-multiple: true

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v3
      with:
        name: Duplicate Finder ${{ github.ref_name }}
        files: release-assets/*
        generate_release_notes: true
